name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  stylua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check formatting with StyLua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check .

  selene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install selene
        run: |
          gh release download --repo Kampfkarren/selene -p '*linux-gnu.zip' -D /tmp
          unzip /tmp/*linux-gnu.zip -d /usr/local/bin
          chmod +x /usr/local/bin/selene
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Lint with selene
        run: selene lua/
